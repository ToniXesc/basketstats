<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a14">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BasketStats</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a14;
      --bg2: #12121f;
      --bg3: #1a1a2e;
      --card: #16162a;
      --border: #2a2a4a;
      --accent: #f0b429;
      --accent2: #e85d04;
      --blue: #4361ee;
      --green: #2ec4b6;
      --red: #e63946;
      --text: #e8e8f0;
      --text2: #9090b0;
      --text3: #5050708;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; min-height:100vh; overflow-x:hidden; }
    
    /* NAVBAR */
    .navbar { position:fixed; top:0; left:0; right:0; height:56px; background:rgba(10,10,20,0.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 16px; gap:12px; z-index:100; }
    .navbar-logo { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:22px; color:var(--accent); letter-spacing:1px; }
    .navbar-title { font-family:'Barlow Condensed',sans-serif; font-weight:600; font-size:18px; color:var(--text); flex:1; }
    .navbar-btn { background:none; border:none; color:var(--text2); font-size:22px; cursor:pointer; padding:4px 8px; border-radius:8px; transition:color 0.2s; }
    .navbar-btn:hover { color:var(--accent); }

    /* BOTTOM NAV */
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; height:60px; background:rgba(10,10,20,0.97); backdrop-filter:blur(12px); border-top:1px solid var(--border); display:flex; z-index:100; }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; color:var(--text2); transition:color 0.2s; border:none; background:none; font-family:'Barlow',sans-serif; }
    .nav-item.active { color:var(--accent); }
    .nav-item svg { width:22px; height:22px; }
    .nav-item span { font-size:10px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; }

    /* MAIN CONTENT */
    .main { padding: 72px 0 76px; min-height:100vh; }
    .page { display:none; padding:16px; }
    .page.active { display:block; }

    /* CARDS */
    .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; }
    .card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .card-title { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:16px; text-transform:uppercase; letter-spacing:1px; color:var(--text); }

    /* BUTTONS */
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:10px 20px; border-radius:8px; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:15px; letter-spacing:1px; text-transform:uppercase; border:none; cursor:pointer; transition:all 0.2s; }
    .btn-primary { background:var(--accent); color:#000; }
    .btn-primary:hover { background:#f5c84a; transform:translateY(-1px); }
    .btn-secondary { background:var(--bg3); color:var(--text); border:1px solid var(--border); }
    .btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
    .btn-danger { background:var(--red); color:#fff; }
    .btn-success { background:var(--green); color:#000; }
    .btn-sm { padding:6px 12px; font-size:13px; }
    .btn-full { width:100%; }
    .btn-icon { width:36px; height:36px; padding:0; border-radius:8px; }

    /* INPUTS */
    .form-group { margin-bottom:14px; }
    .form-label { display:block; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text2); margin-bottom:6px; }
    .form-input { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:10px 12px; color:var(--text); font-family:'Barlow',sans-serif; font-size:15px; outline:none; transition:border-color 0.2s; }
    .form-input:focus { border-color:var(--accent); }
    .form-select { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:8px; padding:10px 12px; color:var(--text); font-family:'Barlow',sans-serif; font-size:15px; outline:none; }

    /* BADGES */
    .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
    .badge-win { background:rgba(46,196,182,0.15); color:var(--green); border:1px solid rgba(46,196,182,0.3); }
    .badge-loss { background:rgba(230,57,70,0.15); color:var(--red); border:1px solid rgba(230,57,70,0.3); }
    .badge-active { background:rgba(240,180,41,0.15); color:var(--accent); border:1px solid rgba(240,180,41,0.3); }

    /* STAT GRID */
    .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    .stat-box { background:var(--bg3); border-radius:8px; padding:10px 6px; text-align:center; }
    .stat-num { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:24px; color:var(--accent); line-height:1; }
    .stat-lbl { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text2); margin-top:3px; }

    /* LIST ITEMS */
    .list-item { display:flex; align-items:center; gap:12px; padding:12px; background:var(--card); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; cursor:pointer; transition:border-color 0.2s; }
    .list-item:hover { border-color:var(--accent); }
    .list-avatar { width:42px; height:42px; border-radius:10px; background:var(--bg3); display:flex; align-items:center; justify-content:center; font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:18px; color:var(--accent); flex-shrink:0; }
    .list-info { flex:1; min-width:0; }
    .list-name { font-weight:600; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .list-sub { font-size:12px; color:var(--text2); margin-top:2px; }
    .list-actions { display:flex; gap:6px; }

    /* MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; display:flex; align-items:flex-end; opacity:0; pointer-events:none; transition:opacity 0.3s; }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal { background:var(--bg2); border-radius:20px 20px 0 0; border-top:1px solid var(--border); width:100%; max-height:90vh; overflow-y:auto; padding:20px; transform:translateY(100%); transition:transform 0.3s; }
    .modal-overlay.open .modal { transform:translateY(0); }
    .modal-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
    .modal-title { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:22px; text-transform:uppercase; letter-spacing:1px; margin-bottom:16px; }

    /* SCORE DISPLAY */
    .score-display { display:flex; align-items:center; justify-content:center; gap:0; background:var(--bg3); border-radius:12px; padding:16px; margin-bottom:16px; }
    .score-team { flex:1; text-align:center; }
    .score-name { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text2); margin-bottom:4px; }
    .score-pts { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:52px; line-height:1; }
    .score-home { color:var(--accent); }
    .score-away { color:var(--blue); }
    .score-sep { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:36px; color:var(--border); padding:0 12px; }

    /* QUARTER DOTS */
    .quarters { display:flex; justify-content:center; gap:8px; margin-bottom:16px; }
    .q-dot { width:28px; height:28px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:12px; color:var(--text2); cursor:pointer; transition:all 0.2s; }
    .q-dot.active { border-color:var(--accent); background:var(--accent); color:#000; }
    .q-dot.done { border-color:var(--green); color:var(--green); }

    /* LIVE GAME STATS BUTTONS */
    .stat-buttons { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
    .stat-btn { background:var(--bg3); border:1px solid var(--border); border-radius:10px; padding:12px 8px; text-align:center; cursor:pointer; transition:all 0.2s; font-family:'Barlow Condensed',sans-serif; }
    .stat-btn:hover { border-color:var(--accent); background:rgba(240,180,41,0.05); }
    .stat-btn-num { font-weight:800; font-size:22px; line-height:1; }
    .stat-btn-lbl { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text2); margin-top:3px; }
    .stat-btn.pts2 .stat-btn-num { color:var(--green); }
    .stat-btn.pts3 .stat-btn-num { color:var(--blue); }
    .stat-btn.ft .stat-btn-num { color:var(--accent); }
    .stat-btn.reb .stat-btn-num { color:#c77dff; }
    .stat-btn.ast .stat-btn-num { color:#48cae4; }
    .stat-btn.stl .stat-btn-num { color:#f77f00; }
    .stat-btn.blk .stat-btn-num { color:#e63946; }
    .stat-btn.tov .stat-btn-num { color:#e63946; }
    .stat-btn.foul .stat-btn-num { color:#f4a261; }
    .stat-btn.miss2 .stat-btn-num { color:var(--text2); }
    .stat-btn.miss3 .stat-btn-num { color:var(--text2); }
    .stat-btn.ftmiss .stat-btn-num { color:var(--text2); }

    /* PLAYER SELECTOR */
    .player-selector { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px; }
    .player-chip { padding:6px 14px; border-radius:20px; border:1px solid var(--border); font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:14px; cursor:pointer; transition:all 0.2s; background:var(--bg3); color:var(--text2); }
    .player-chip.selected { border-color:var(--accent); background:rgba(240,180,41,0.1); color:var(--accent); }

    /* SECTION HEADER */
    .section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .section-title { font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:20px; text-transform:uppercase; letter-spacing:1px; }

    /* EMPTY STATE */
    .empty-state { text-align:center; padding:40px 20px; color:var(--text2); }
    .empty-icon { font-size:48px; margin-bottom:12px; opacity:0.5; }
    .empty-text { font-size:14px; }

    /* DIVIDER */
    .divider { height:1px; background:var(--border); margin:12px 0; }

    /* TWO COL */
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

    /* TOAST */
    .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--bg3); border:1px solid var(--accent); border-radius:8px; padding:10px 20px; font-size:14px; font-weight:600; color:var(--accent); z-index:300; opacity:0; transition:all 0.3s; pointer-events:none; white-space:nowrap; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

    /* ANIMATIONS */
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .page.active { animation:fadeIn 0.2s ease; }

    /* SUMMARY TABLE */
    .summary-table { width:100%; border-collapse:collapse; font-size:13px; }
    .summary-table th { background:var(--bg3); padding:8px 6px; text-align:center; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--text2); }
    .summary-table th:first-child { text-align:left; padding-left:10px; }
    .summary-table td { padding:8px 6px; text-align:center; border-bottom:1px solid var(--border); }
    .summary-table td:first-child { text-align:left; padding-left:10px; font-weight:600; }
    .summary-table tr:last-child td { border-bottom:none; }

    .chip-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
    .chip { padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; background:var(--bg3); border:1px solid var(--border); color:var(--text2); cursor:pointer; }
    .chip.active { background:rgba(240,180,41,0.1); border-color:var(--accent); color:var(--accent); }
  </style>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <span class="navbar-logo">🏀</span>
  <span class="navbar-title" id="pageTitle">BasketStats</span>
  <button class="navbar-btn" id="navAction" style="display:none">＋</button>
</div>

<!-- MAIN CONTENT -->
<div class="main">

  <!-- HOME PAGE -->
  <div class="page active" id="page-home">
    <div class="section-header">
      <span class="section-title">Inicio</span>
    </div>
    <div id="homeSeasonInfo" class="card" style="display:none">
      <div class="card-header">
        <span class="card-title" id="homeSeasonName">Temporada</span>
        <span class="badge badge-active">Activa</span>
      </div>
      <div class="stat-grid" id="homeStats"></div>
    </div>
    <div id="homeNoSeason" class="empty-state">
      <div class="empty-icon">🏀</div>
      <div class="empty-text">Crea una temporada para empezar</div>
      <br>
      <button class="btn btn-primary" onclick="switchPage('seasons')">Crear Temporada</button>
    </div>
    <div id="recentGames"></div>
  </div>

  <!-- SEASONS PAGE -->
  <div class="page" id="page-seasons">
    <div id="seasonsList"></div>
  </div>

  <!-- TEAMS PAGE -->
  <div class="page" id="page-teams">
    <div id="teamsList"></div>
  </div>

  <!-- HISTORY PAGE -->
  <div class="page" id="page-history">
    <div id="historyList"></div>
  </div>

  <!-- LIVE GAME PAGE -->
  <div class="page" id="page-live">
    <div id="liveGameContent">
      <div class="empty-state">
        <div class="empty-icon">🏀</div>
        <div class="empty-text">Configura un partido para empezar</div>
        <br>
        <button class="btn btn-primary" onclick="showGameSetup()">Nuevo Partido</button>
      </div>
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-item active" data-page="home" onclick="switchPage('home')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
    <span>Inicio</span>
  </button>
  <button class="nav-item" data-page="seasons" onclick="switchPage('seasons')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    <span>Temporadas</span>
  </button>
  <button class="nav-item" data-page="teams" onclick="switchPage('teams')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
    <span>Equipos</span>
  </button>
  <button class="nav-item" data-page="live" onclick="switchPage('live')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16"/></svg>
    <span>Partido</span>
  </button>
  <button class="nav-item" data-page="history" onclick="switchPage('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
    <span>Historial</span>
  </button>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
